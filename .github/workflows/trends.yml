name: Googleトレンド収集

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 日本時間 朝10時（UTC 1時）に実行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install pytrends

      - name: トレンド収集実行
        run: python trends_crawler.py

      - name: 結果を保存
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add trends.csv
          git diff --staged --quiet || git commit -m "📈 トレンド更新: $(date '+%Y-%m-%d')"
          git push
